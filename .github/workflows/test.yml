name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['10.*', '11.*', '12.*', '13.*']
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 10.*
            testbench: ^8.0
          - laravel: 11.*
            testbench: ^9.2
          - laravel: 12.*
            testbench: ^10.8
          - laravel: 13.*
            testbench: ^11.0
        exclude:
          - php: '8.5'
            laravel: 10.*
          - php: '8.5'
            laravel: 11.*
          - laravel: 13.*
            php: '8.2'

    name: Test PHP ${{ matrix.php }} - L ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Determine Pest flags
        id: pest-info
        run: |
          PEST_VERSION=$(composer show -D --format=json | jq -r '.installed[] | select(.name=="pestphp/pest") | .version' 2>/dev/null || true)
          PEST_VERSION=${PEST_VERSION#v}
          FLAGS=""

          version_ge() {
            printf '%s\n%s\n' "$2" "$1" | sort -V | head -n1 | grep -qx "$2"
          }

          THRESH=">=4.0"
          CMP_VERSION=${THRESH#>=}  # strip leading '>=', resulting in '3.0'

          if [ -n "$PEST_VERSION" ] && [ "$PEST_VERSION" != "null" ]; then
            if version_ge "$PEST_VERSION" "$CMP_VERSION"; then
              FLAGS="--fail-on-deprecation"
            elif version_ge "$PEST_VERSION" "1.0.0"; then
              FLAGS="--display-deprecations"
            else
              FLAGS=""
            fi
          fi

          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run tests
        run: ./vendor/bin/pest --ci --parallel ${{ steps.pest-info.outputs.flags }}
